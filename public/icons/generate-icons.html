<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<p>Open this file in a browser, right-click each canvas, and "Save Image As" to get your icons.</p>
<h3>192x192</h3>
<canvas id="c192" width="192" height="192"></canvas>
<h3>512x512</h3>
<canvas id="c512" width="512" height="512"></canvas>
<h3>Apple Touch Icon 180x180</h3>
<canvas id="c180" width="180" height="180"></canvas>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  // Black background
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, size, size);
  // Red accent bar at bottom
  const barH = size * 0.06;
  ctx.fillStyle = '#DC2626';
  ctx.fillRect(0, size - barH, size, barH);
  // Text
  ctx.fillStyle = '#FFFFFF';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // "CIVIC" in white
  const mainSize = size * 0.22;
  ctx.font = `900 ${mainSize}px Arial Black, Arial, sans-serif`;
  ctx.fillText('CIVIC', size/2, size * 0.38);
  // "FORGE" in red
  ctx.fillStyle = '#DC2626';
  ctx.font = `900 ${mainSize}px Arial Black, Arial, sans-serif`;
  ctx.fillText('FORGE', size/2, size * 0.62);
}
drawIcon(document.getElementById('c192'), 192);
drawIcon(document.getElementById('c512'), 512);
drawIcon(document.getElementById('c180'), 180);
</script>
</body>
</html>
